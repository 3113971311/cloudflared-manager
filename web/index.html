<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Cloudflared 内网穿透管理</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<aside id="sidebar">
  <div class="sb-brand">
    <img src="logo.png" class="sb-logo" alt="Logo">
    <div>
      <h3>寒彬 Cloudflared</h3>
      <p>内网穿透管理</p>
    </div>
  </div>

  <nav class="sb-nav">
    <button class="nav-btn active" data-page="dashboard">
      <span class="nav-icon">&#9679;</span> 概览
    </button>
    <button class="nav-btn" data-page="tunnels">
      <span class="nav-icon">&#9670;</span> 隧道
    </button>
    <button class="nav-btn" data-page="domains">
      <span class="nav-icon">&#9729;</span> 域名
    </button>
    <button class="nav-btn" data-page="logs">
      <span class="nav-icon">&#9776;</span> 日志
    </button>
  </nav>

  <div class="sb-actions">
    <p class="sb-label">隧道控制</p>
    <button id="btn-start" class="act-btn ac-1" onclick="sidebarStart()">&#9654; 启动隧道</button>
    <button id="btn-stop" class="act-btn ac-2" disabled onclick="stopTunnel()">&#9632; 停止隧道</button>
    <button id="btn-killall" class="act-btn ac-3" onclick="killAllTunnels()">&#10005; 停止所有</button>
  </div>
</aside>

<main id="main-content">

  <!-- ═══════════ 概览 ═══════════ -->
  <section id="page-dashboard" class="page active">

    <div class="stat-grid">
      <div class="stat-card sc-ok" id="sc-installed">
        <div class="sc-icon">&#10003;</div>
        <div class="sc-body">
          <div class="sc-label">cloudflared</div>
          <div class="sc-val" id="status-installed">检测中...</div>
          <div class="sc-sub" id="status-version"></div>
        </div>
        <button id="btn-install" class="btn xs ghost" onclick="installCloudflared()">安装</button>
      </div>
      <div class="stat-card sc-ok" id="sc-login">
        <div class="sc-icon">&#9786;</div>
        <div class="sc-body">
          <div class="sc-label">Cloudflare 登录</div>
          <div class="sc-val" id="status-login">检测中...</div>
        </div>
        <button id="btn-login" class="btn xs ghost" onclick="loginCloudflare()">登录</button>
      </div>
      <div class="stat-card sc-ok" id="sc-autostart">
        <div class="sc-icon">&#9881;</div>
        <div class="sc-body">
          <div class="sc-label">开机自启</div>
          <div class="sc-val" id="autostart-status">检测中...</div>
        </div>
        <div class="sc-actions">
          <button id="btn-autostart-on" class="btn xs ghost" style="display:none" onclick="enableAutostart()">开启</button>
          <button id="btn-autostart-off" class="btn xs ghost" style="display:none" onclick="disableAutostart()">关闭</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr">
        <h2>隧道列表</h2>
        <button class="btn sm" onclick="refreshTunnels()">刷新</button>
      </div>
      <div class="tbl-wrap">
        <table id="tunnel-table">
          <thead><tr><th>名称</th><th>ID</th><th class="right">连接</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </section>

  <!-- ═══════════ 隧道 ═══════════ -->
  <section id="page-tunnels" class="page">

    <div class="card">
      <h2>创建隧道</h2>
      <div class="form-row">
        <input type="text" id="new-tunnel-name" placeholder="隧道名称（小写字母 + 数字 + 连字符）">
        <button class="btn" onclick="createTunnel()">创建隧道</button>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr">
        <h2>我的隧道</h2>
        <div class="btn-group">
          <button class="btn sm ghost" onclick="refreshTunnels()">刷新</button>
          <button class="btn sm ghost" onclick="setCurrentTunnel()">设为当前</button>
          <button class="btn sm danger" onclick="deleteSelectedTunnel()">删除选中</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table id="tunnel-list-table">
          <thead><tr><th style="width:32px"></th><th>名称</th><th>ID</th><th class="right">连接</th><th>状态</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </section>

  <!-- ═══════════ 域名 ═══════════ -->
  <section id="page-domains" class="page">

    <div class="card">
      <h2>当前配置</h2>
      <div class="kv-row">
        <span class="kv-k">隧道</span>
        <span class="kv-v muted" id="config-tunnel">未设置</span>
        <span class="kv-k">配置文件</span>
        <span class="kv-v muted" id="config-status">未创建</span>
      </div>
    </div>

    <div class="card">
      <h2>添加域名映射</h2>
      <div class="form-grid">
        <input type="text" id="domain-hostname" placeholder="域名（如 www.baidu.com）">
        <input type="text" id="domain-service" placeholder="本地服务（如 http://localhost:8080）" value="http://localhost:8080">
        <button class="btn" onclick="addDomainRule()">添加 / 更新</button>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr">
        <h2>已配置的映射</h2>
        <div class="btn-group">
          <button class="btn sm ghost" onclick="refreshDomains()">刷新</button>
          <button class="btn sm danger" onclick="deleteDomainRule()">删除选中</button>
          <button class="btn sm" onclick="bindDns()">绑定 DNS</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table id="domain-table">
          <thead><tr><th style="width:32px"></th><th>域名</th><th>本地服务</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </section>

  <!-- ═══════════ 日志 ═══════════ -->
  <section id="page-logs" class="page">

    <div class="card">
      <h2>运行控制</h2>
      <div class="ctrl-bar">
        <select id="tunnel-select">
          <option value="">-- 选择隧道 --</option>
        </select>
        <button id="log-btn-start" class="btn" onclick="startTunnel()">启动隧道</button>
        <button id="log-btn-stop" class="btn warn" disabled onclick="stopTunnel()">停止隧道</button>
        <button class="btn danger" onclick="killAllTunnels()">停止所有</button>
        <span id="tunnel-state" class="state muted">&#9679; 未运行</span>
      </div>
    </div>

    <div class="card log-card">
      <div class="card-hdr">
        <h2>运行日志</h2>
        <div class="btn-group">
          <button class="btn sm ghost" onclick="clearLogs()">清空</button>
          <button class="btn sm ghost" onclick="copyLogs()">复制</button>
        </div>
      </div>
      <pre id="log-output"><span class="log-hint">等待隧道启动...</span></pre>
    </div>

  </section>

</main>

<footer id="statusbar">
  <span id="s-version">检测中...</span>
  <span class="sb-sep"></span>
  <span id="s-login">检测中...</span>
  <span class="sb-sep"></span>
  <span id="s-tunnel"></span>
  <div class="sb-spacer"></div>
  <button class="btn xs ghost" onclick="refreshAll()">刷新</button>
</footer>

<script src="js/app.js"></script>
</body>
</html>
